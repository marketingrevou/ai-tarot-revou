<title>AI Tarot</title>

<style>
  body {
    background-color: #080810;
    color: #F0E9D6;
    font-family: "Plus Jakarta Sans", sans-serif;
    min-height: 100dvh;
  }

  /* ── Starfield background ─────────────────────────── */
  .star-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .star-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle, rgba(212,168,71,0.7) 1px, transparent 1px),
      radial-gradient(circle, rgba(240,233,214,0.5) 1px, transparent 1px),
      radial-gradient(circle, rgba(212,168,71,0.4) 1.5px, transparent 1.5px),
      radial-gradient(circle, rgba(240,233,214,0.3) 1px, transparent 1px);
    background-size: 200px 200px, 150px 150px, 300px 300px, 100px 100px;
    background-position: 20px 40px, 80px 120px, 160px 60px, 50px 170px;
    opacity: 0.25;
  }
  .star-bg svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0.07;
  }

  /* ── Screens ──────────────────────────────────────── */
  .screen { display: none; min-height: 100dvh; flex-direction: column; position: relative; z-index: 1; }
  .screen.active { display: flex; }

  /* ── Card selection ───────────────────────────────── */
  .card-item { cursor: pointer; }
  .card-item.selected { outline: 3px solid #D4A847; outline-offset: 2px; }

  /* Mobile scroll strip — hide scrollbar */
  #card-grid::-webkit-scrollbar { display: none; }

  /* ── Animations ───────────────────────────────────── */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeInUp 0.5s ease forwards; opacity: 0; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; display: inline-block; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .pulse { animation: pulse 1.5s ease-in-out infinite; }

  @keyframes twinkle { 0%,100%{opacity:0.6} 50%{opacity:1} }

  /* ── Material Symbols ─────────────────────────────── */
  .ms { font-family: "Material Symbols Outlined"; font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
  .ms-fill { font-variation-settings: "FILL" 1; }

  /* ── Inputs ───────────────────────────────────────── */
  .tarot-input {
    width: 100%;
    height: 3.5rem;
    padding: 0 1.25rem;
    background: #0d0d1a !important;
    border: 2px solid rgba(212,168,71,0.3);
    border-radius: 0.75rem;
    font-size: 1rem;
    font-weight: 500;
    color: #F0E9D6 !important;
    outline: none;
    transition: border-color 0.2s;
    font-family: "Plus Jakarta Sans", sans-serif;
    -webkit-text-fill-color: #F0E9D6 !important;
    appearance: none;
    -webkit-appearance: none;
  }
  .tarot-input::placeholder { color: rgba(240,233,214,0.55) !important; -webkit-text-fill-color: rgba(240,233,214,0.55) !important; opacity: 1; }
  .tarot-input:-webkit-autofill,
  .tarot-input:-webkit-autofill:hover,
  .tarot-input:-webkit-autofill:focus,
  .tarot-input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0 1000px #0d0d1a inset !important;
    -webkit-text-fill-color: #F0E9D6 !important;
    caret-color: #F0E9D6;
  }
  .tarot-input:focus { border-color: #D4A847; }

  /* ── Cinzel headings ──────────────────────────────── */
  .cinzel { font-family: "Cinzel", serif; }
</style>
</head>

     APP LOGIC

<script>
// ── SUPABASE ────────────────────────────────────────────────────────────────
const SUPABASE_URL  = "https://mojbdsayviuihhootyir.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vamJkc2F5dml1aWhob290eWlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0OTIxNDQsImV4cCI6MjA4ODA2ODE0NH0.18J9GxpTpoFHFP-XN1zhWqaAwK7cjF2UI3eUkBjY5HE";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

async function saveUserToSupabase(name, email) {
  const { error } = await sb.from("tarot_users").insert({ name, email });
  if (error) console.error("Supabase insert error:", error.message);
}

// ── CARD DECK ──────────────────────────────────────────────────────────────
const CARDS = [
  { id:1,  name:"The Automation",   icon:"smart_toy",    color:"#FF8A80" },
  { id:2,  name:"The Collaborator", icon:"handshake",    color:"#A5D6A7" },
  { id:3,  name:"The Disruptor",    icon:"bolt",         color:"#FFF176" },
  { id:4,  name:"The Architect",    icon:"architecture", color:"#90CAF9" },
  { id:5,  name:"The Learner",      icon:"school",       color:"#CE93D8" },
  { id:6,  name:"The Pioneer",      icon:"explore",      color:"#FFCC80" },
  { id:7,  name:"The Connector",    icon:"hub",          color:"#80DEEA" },
  { id:8,  name:"The Creator",      icon:"palette",      color:"#F48FB1" },
  { id:9,  name:"The Strategist",   icon:"psychology",   color:"#B0BEC5" },
  { id:10, name:"The Innovator",    icon:"lightbulb",    color:"#C5E1A5" },
  { id:11, name:"The Guardian",     icon:"security",     color:"#EF9A9A" },
  { id:12, name:"The Visionary",    icon:"visibility",   color:"#FFE082" },
];

// ── STATE ───────────────────────────────────────────────────────────────────
const state = { name:"", email:"", profession:"", deck:[], selected:[] };


// ── HELPERS ─────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── NAVIGATION ──────────────────────────────────────────────────────────────
function goTo(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${n}`).classList.add('active');
  window.scrollTo(0,0);
}

function goToSelection() {
  const nameInput  = document.getElementById('name-input');
  const emailInput = document.getElementById('email-input');
  const majorInput = document.getElementById('major-input');
  const err        = document.getElementById('input-error');
  state.name       = nameInput.value.trim();
  state.email      = emailInput.value.trim();
  state.profession = majorInput.value.trim();
  if (!state.name || !state.email || !state.profession) {
    err.classList.remove('hidden');
    if (!state.name) nameInput.focus();
    else if (!state.email) emailInput.focus();
    else majorInput.focus();
    return;
  }
  err.classList.add('hidden');
  saveUserToSupabase(state.name, state.email);
  state.deck = shuffle(CARDS);
  state.selected = [];
  renderCardGrid();
  updateSelectionUI();
  goTo(2);
}

function goToReveal() {
  if (state.selected.length !== 3) return;
  renderRevealScreen();
  goTo(3);
}

function goToReading() {
  const title = document.getElementById('reading-title');
  if (title && state.name) title.textContent = `Ramalanmu, ${state.name} 🔮`;
  goTo(4);
  fetchReading();
}

function resetApp() {
  document.getElementById('name-input').value = '';
  document.getElementById('email-input').value = '';
  goTo(1);
}

// ── SCREEN 2: CARD GRID ─────────────────────────────────────────────────────

  return `

      <svg class="absolute inset-0 w-full h-full" viewBox="0 0 90 144" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">

          <line x1="20" y1="30"  x2="45" y2="55"/>
          <line x1="45" y1="55"  x2="70" y2="35"/>
          <line x1="45" y1="55"  x2="50" y2="90"/>
          <line x1="50" y1="90"  x2="25" y2="110"/>
          <line x1="50" y1="90"  x2="72" y2="115"/>
        </g>
        <g fill="#D4A847" opacity="0.55">

          <polygon points="70,32 71.5,35 70,38 68.5,35"/>
          <polygon points="50,87 51.5,90 50,93 48.5,90"/>
          <polygon points="25,107 26.5,110 25,113 23.5,110"/>
          <polygon points="72,112 73.5,115 72,118 70.5,115"/>
        </g>
      </svg>
      <!-- Inner frame -->
      <div class="absolute" style="inset:8px;border:1px solid rgba(212,168,71,0.25);border-radius:4px"></div>
      <!-- Center diamond icon -->
      <span class="ms relative z-10" style="color:rgba(212,168,71,0.45);font-size:1.5rem">diamond</span>
    </div>`;
}

function renderCardGrid() {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  const total = state.deck.length;
  const isMobile = window.innerWidth < 640;

  if (isMobile) {
    // ── Mobile: two stacked fan rows (6 + 6) ─────────────
    Object.assign(grid.style, {
      display: 'flex', flexDirection: 'column', gap: '20px',
      padding: '8px 0 8px', alignItems: 'center', overflow: 'visible',
    });

    [0, 1].forEach(g => {
      const wrap = document.createElement('div');
      Object.assign(wrap.style, {
        display: 'flex', alignItems: 'flex-end', justifyContent: 'center',
        overflow: 'visible', width: '100%', minHeight: '130px',
      });

      for (let j = 0; j < 6; j++) {
        const globalIdx = g * 6 + j;
        const rot = (j / 5) * 40 - 20; // −20° to +20°

        const div = document.createElement('div');
        div.className = 'card-item rounded-lg overflow-hidden';
        div.dataset.index = globalIdx;
        div.dataset.rot = rot;
        Object.assign(div.style, {
          background: '#0d0d1a',
          border: '2px solid rgba(212,168,71,0.45)',
          width: '62px', height: '100px',
          marginRight: j < 5 ? '-36px' : '0', flexShrink: '0',
          zIndex: j, transformOrigin: 'bottom center',
          transform: `rotate(${rot}deg)`,
          transition: 'transform 0.2s ease, box-shadow 0.2s ease',
          boxShadow: '2px 3px 10px rgba(0,0,0,0.6)',
        });
        div.innerHTML = cardBackHTML();
        div.addEventListener('click', () => toggleCard(globalIdx));
        wrap.appendChild(div);
      }

      grid.appendChild(wrap);
    });
    return;
  }

  // ── Desktop: fan arc ─────────────────────────────────
  Object.assign(grid.style, {
    display: 'flex', alignItems: 'flex-end', justifyContent: 'center',
    overflow: 'visible', minHeight: '240px', padding: '0 40px 24px', gap: '0',
  });

  state.deck.forEach((card, i) => {
    const rot = (i / (total - 1)) * 44 - 22; // −22° to +22°

    const div = document.createElement('div');
    div.className = 'card-item rounded-lg overflow-hidden';
    div.dataset.index = i;
    div.dataset.rot = rot;
    Object.assign(div.style, {
      background: '#0d0d1a',
      border: '2px solid rgba(212,168,71,0.45)',
      width: '84px', height: '134px',
      marginRight: '-52px', flexShrink: '0', zIndex: i,
      transformOrigin: 'bottom center',
      transform: `rotate(${rot}deg)`,
      transition: 'transform 0.2s ease, box-shadow 0.2s ease',
      boxShadow: '2px 4px 10px rgba(0,0,0,0.5)',
    });
    div.innerHTML = cardBackHTML();

    div.addEventListener('mouseenter', () => {
      if (div.classList.contains('selected')) return;
      div.style.transform = 'rotate(0deg) translateY(-22px) scale(1.08)';
      div.style.zIndex = '200';
      div.style.boxShadow = '0 18px 36px rgba(212,168,71,0.25)';
    });
    div.addEventListener('mouseleave', () => {
      if (div.classList.contains('selected')) return;
      div.style.transform = `rotate(${rot}deg)`;
      div.style.zIndex = i;
      div.style.boxShadow = '2px 4px 10px rgba(0,0,0,0.5)';
    });

    div.addEventListener('click', () => toggleCard(i));
    grid.appendChild(div);
  });
}

function toggleCard(index) {
  const card = state.deck[index];
  const idx  = state.selected.findIndex(c => c.id === card.id);
  if (idx !== -1) {
    state.selected.splice(idx, 1);
  } else {
    if (state.selected.length >= 3) return;
    state.selected.push(card);
  }
  updateSelectionUI();
}

function updateSelectionUI() {
  const count    = state.selected.length;
  const isMobile = window.innerWidth < 640;

  document.querySelectorAll('.card-item').forEach((el, i) => {
    const card       = state.deck[i];
    const isSelected = state.selected.some(c => c.id === card.id);
    const rot        = parseFloat(el.dataset.rot || 0);
    el.classList.toggle('selected', isSelected);
    el.style.borderColor = isSelected ? '#D4A847' : 'rgba(212,168,71,0.45)';

    if (isMobile) {
      if (isSelected) {
        el.style.transform = 'rotate(0deg) translateY(-18px)';
        el.style.zIndex    = '150';
        el.style.boxShadow = '0 8px 20px rgba(212,168,71,0.4)';
      } else {
        el.style.transform = `rotate(${rot}deg)`;
        el.style.zIndex    = i % 6;
        el.style.boxShadow = '2px 3px 8px rgba(0,0,0,0.6)';
      }
    } else {
      if (isSelected) {
        el.style.transform  = 'rotate(0deg) translateY(-32px)';
        el.style.zIndex     = '150';
        el.style.boxShadow  = '0 14px 28px rgba(212,168,71,0.45)';
      } else {
        el.style.transform  = `rotate(${rot}deg)`;
        el.style.zIndex     = i;
        el.style.boxShadow  = '2px 4px 10px rgba(0,0,0,0.5)';
      }
    }
  });

  const btn = document.getElementById('reveal-btn');
  if (count === 3) {
    btn.disabled = false;
    btn.style.background = '#D4A847';
    btn.style.color = '#080810';
    btn.style.cursor = 'pointer';
    btn.innerHTML = '<span>Lihat Interpretasi</span><span class="ms">auto_awesome</span>';
  } else {
    btn.disabled = true;
    btn.style.background = '#1a1a2e';
    btn.style.color = '#3a3a5c';
    btn.style.cursor = 'not-allowed';
    btn.innerHTML = '<span>Lihat Interpretasi</span><span class="ms">lock</span>';
  }
}

// ── SCREEN 3: REVEAL ────────────────────────────────────────────────────────
function renderRevealScreen() {
  const container = document.getElementById('revealed-cards');
  container.innerHTML = '';

  state.selected.forEach((card, i) => {
    const div = document.createElement('div');
    div.className = 'relative rounded-lg overflow-hidden fade-in';
    div.style.cssText = `aspect-ratio:2/3;border:2px solid #D4A847;box-shadow:3px 3px 0 rgba(212,168,71,0.35);animation-delay:${i*0.15}s`;
    div.innerHTML = `
      <div class="absolute inset-0 flex flex-col">
        <div class="flex-1 flex items-center justify-center" style="background:${card.color}">
          <span class="ms ms-fill text-slate-900" style="font-size:2rem">${card.icon}</span>
        </div>
        <div class="py-2 px-1 text-center" style="background:#0d0d1a;border-top:1px solid rgba(212,168,71,0.4)">
          <p class="font-black leading-none uppercase cinzel" style="font-size:7px;color:#D4A847;letter-spacing:0.05em">${card.name}</p>
        </div>
      </div>`;
    container.appendChild(div);
  });

  const names = state.selected.map(c => c.name);
  document.getElementById('reveal-summary').textContent =
    `"${names[0]} di masa lalu, ${names[1]} di masa kini, ${names[2]} di masa depan."`;
}

// ── SCREEN 4: READING ───────────────────────────────────────────────────────
async function fetchReading() {
  _accumulated = '';
  const positions = ['Masa Lalu', 'Sekarang', 'Masa Depan'];
  const cards = state.selected.map((c, i) => ({ position: positions[i], name: c.name }));

  // Reset UI
  document.getElementById('reading-loading').classList.remove('hidden');
  document.getElementById('reading-content').classList.add('hidden');
  document.getElementById('reading-content').innerHTML = '';
  document.getElementById('reading-footer').classList.add('hidden');

  try {
    const res = await fetch('/api/reading', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ profession: state.profession, cards }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') {
          document.getElementById('reading-footer').classList.remove('hidden');
          break;
        }
        try {
          const chunk = JSON.parse(data);
          if (chunk.text) appendStreamChunk(chunk.text);
        } catch {}
      }
    }
  } catch (err) {
    document.getElementById('reading-loading').classList.add('hidden');
    document.getElementById('reading-content').classList.remove('hidden');
    document.getElementById('reading-content').innerHTML = `
      <div class="text-center space-y-2 p-6">
        <span class="ms" style="color:#e57373;font-size:2rem">error</span>
        <p class="text-sm font-medium" style="color:#e57373">Aduh, gagal ngambil ramalan nih 😓</p>
        <p class="text-xs" style="color:rgba(240,233,214,0.45)">${err.message}</p>
      </div>`;
    document.getElementById('reading-footer').classList.remove('hidden');
  }
}

// Accumulate streamed text and render panels — created once, updated in-place (no flicker)
let _accumulated = '';
const _positions = ['Masa Lalu', 'Sekarang', 'Masa Depan'];
const _posIcons  = ['history', 'radio_button_checked', 'rocket_launch'];

function appendStreamChunk(text) {
  _accumulated += text;
  const parts = _accumulated.split(/\n\n+/);
  const content = document.getElementById('reading-content');
  const loading = document.getElementById('reading-loading');

  if (parts.some(p => p.trim())) {
    loading.classList.add('hidden');
    content.classList.remove('hidden');
  }

  parts.forEach((part, i) => {
    if (!part.trim() || i >= 4) return;

    const panelId = `rp-${i}`;
    const textId  = `rt-${i}`;

    // Create panel once
    if (!document.getElementById(panelId)) {
      if (i === 3) {
        // Separator before Langkah Nyata
        const sep = document.createElement('div');
        sep.id = 'rp-sep';
        sep.className = 'flex items-center gap-3';
        sep.innerHTML = `
          <div class="flex-1 h-px" style="background:linear-gradient(to right,transparent,rgba(78,205,196,0.3))"></div>
          <span class="ms" style="color:rgba(78,205,196,0.4);font-size:0.9rem">bolt</span>
          <div class="flex-1 h-px" style="background:linear-gradient(to left,transparent,rgba(78,205,196,0.3))"></div>`;
        content.appendChild(sep);
      }

      const div = document.createElement('div');
      div.id = panelId;

      if (i < 3) {
        // ── Card reading panel ─────────────────────────────────────
        const card = state.selected[i];
        div.className = 'fade-in rounded-2xl overflow-hidden';
        div.style.cssText = `border:2px solid rgba(212,168,71,0.5);box-shadow:4px 4px 0 rgba(212,168,71,0.2);animation-delay:${i*0.1}s`;
        div.innerHTML = `
          <div class="flex items-center gap-3 px-4 py-3" style="background:${card.color}">
            <div class="w-11 h-11 rounded-full flex items-center justify-center flex-shrink-0" style="background:rgba(0,0,0,0.12)">
              <span class="ms ms-fill text-slate-900" style="font-size:1.4rem">${card.icon}</span>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-1 mb-0.5">
                <span class="ms text-slate-700" style="font-size:0.9rem">${_posIcons[i]}</span>
                <p class="text-[9px] font-bold uppercase tracking-[0.2em] text-slate-700 cinzel">${_positions[i]}</p>
              </div>
              <p class="text-sm font-black text-slate-900 leading-tight cinzel">${card.name}</p>
            </div>
          </div>
          <div class="px-4 py-4" style="background:#0d0d1a">
            <p id="${textId}" class="text-sm leading-relaxed" style="color:#F0E9D6"></p>
          </div>`;

      } else {
        // ── Langkah Nyata panel ────────────────────────────────────
        div.className = 'fade-in rounded-2xl overflow-hidden';
        div.style.cssText = `border:2px solid rgba(78,205,196,0.4);box-shadow:0 0 20px rgba(78,205,196,0.08),4px 4px 0 rgba(78,205,196,0.15);animation-delay:0.3s`;
        div.innerHTML = `
          <div class="px-4 py-3 flex items-center gap-3" style="background:linear-gradient(135deg,rgba(78,205,196,0.15) 0%,rgba(78,205,196,0.05) 100%);border-bottom:1px solid rgba(78,205,196,0.2)">
            <span class="ms ms-fill" style="color:#4ECDC4;font-size:1.5rem">bolt</span>
            <div>
              <p class="text-[9px] font-bold uppercase tracking-[0.2em] cinzel" style="color:rgba(78,205,196,0.65)">Langkah Nyata</p>
              <p class="text-sm font-black cinzel" style="color:#4ECDC4">Aksi untuk Minggu Ini</p>
            </div>
          </div>
          <div class="p-5" style="background:#0d0d1a">
            <p id="${textId}" class="text-sm leading-relaxed" style="color:#F0E9D6"></p>
          </div>`;
      }

      content.appendChild(div);
    }

    // Update text in-place — no DOM rebuild, no flicker
    const textEl = document.getElementById(textId);
    if (textEl) textEl.textContent = part.trim();
  });
}
</script>
